<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>林森苑公設點數查詢系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 20px 16px 60px;
}
.container { width: 680px; max-width: 100%; }

/* Card */
.card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  padding: 40px 36px 36px;
}
.logo {
  width: 48px; height: 48px; background: #1a56db;
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.logo svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
input[type="text"], input[type="password"] {
  width: 100%; padding: 9px 13px;
  border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: 14px; color: #111827; outline: none;
  transition: border-color 0.15s;
}
input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.10); }
.field { margin-bottom: 16px; }

/* Buttons */
.btn {
  padding: 10px 20px; background: #1a56db; color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.btn:hover { background: #1444b8; }
.btn:disabled { background: #93a8e8; cursor: not-allowed; }
.btn-full { width: 100%; margin-top: 6px; }
.btn-outline {
  padding: 9px 20px; background: #fff; color: #1a56db;
  border: 1.5px solid #1a56db; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn-outline:hover { background: #eff4ff; }

.error-msg {
  margin-top: 14px; padding: 10px 14px;
  background: #fef2f2; border: 1.5px solid #fca5a5;
  color: #991b1b; border-radius: 8px; font-size: 13px; font-weight: 600; display: none;
}

/* Section */
.section {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  padding: 28px 28px 24px; margin-top: 20px; display: none;
}
.section-title { font-size: 16px; font-weight: 700; color: #111827; }
.section-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

/* User bar */
.user-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: #eff4ff; border-radius: 10px; margin-bottom: 20px;
}
.user-bar-name { font-size: 13px; font-weight: 600; color: #1e40af; }
.user-bar-sub  { font-size: 11px; color: #6b7280; }
.logout-btn {
  font-size: 12px; color: #6b7280; background: none;
  border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 10px; cursor: pointer;
}
.logout-btn:hover { color: #111827; }

/* Stats */
.stat-row { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; }
.stat-box { flex: 1; background: #f0f4ff; border-radius: 10px; padding: 14px 16px; }
.stat-box.warn { background: #fff7ed; }
.point-big { font-size: 28px; font-weight: 700; color: #1a56db; line-height: 1; }
.point-big.warn { color: #c2410c; }
.point-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
.expire-note { font-size: 11px; color: #c2410c; margin-top: 3px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: #f9fafb; color: #374151; font-weight: 600; font-size: 12px;
  padding: 9px 12px; text-align: left; border-bottom: 1.5px solid #e5e7eb;
}
td { padding: 10px 12px; color: #111827; border-bottom: 1px solid #f3f4f6; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9fafb; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-red    { background: #fee2e2; color: #991b1b; }
.badge-green  { background: #d1fae5; color: #065f46; }
.badge-blue   { background: #dbeafe; color: #1e40af; }
.badge-gray   { background: #f3f4f6; color: #374151; }

.tx-minus { font-weight: 700; color: #dc2626; }
.tx-plus  { font-weight: 700; color: #059669; }

.empty-tip { text-align: center; color: #9ca3af; padding: 24px 0; font-size: 13px; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #ffffff55; border-top-color: #fff;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 520px) {
  #statRow { flex-direction: column; }
  body { padding: 0 0 40px; align-items: flex-start; }
  .card { border-radius: 0; box-shadow: none; padding: 20px 16px 24px; }
  .section { border-radius: 0; margin-top: 8px; padding: 20px 16px; }
  .banner-img { height: 140px !important; margin: 0 -16px 20px -16px !important; border-radius: 0 !important; }
}
</style>
</head>
<body>
<div class="container">

  <!-- 登入 -->
  <div class="card" id="loginCard">
    <div class="banner-img" style="margin:-40px -36px 24px -36px;border-radius:16px 16px 0 0;overflow:hidden;height:140px;">
      <img src="https://lh3.googleusercontent.com/gps-cs-s/APNQkAG0rlmSYs04bzg_pdUjwIFbzGD53FRsJ1NFVXGjsZFjI_TF0HNSiWyF3IZtEa6kMXWkjqgmRO1dZyQdxa64rPAQUzQsG7dlrF-wCU1nXdFluek3Bjl02XrHK8HhUCenOy07z4gy=s1360-w1360-h1020-rw" style="width:100%;height:100%;object-fit:cover;object-position:0 80%;" alt="林森苑">
    </div>
    <h1>林森苑公設點數查詢系統</h1>
    
    <div class="field">
      <label for="account">帳號</label>
      <input type="text" id="account" placeholder="請輸入帳號" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="field">
      <label for="password">密碼</label>
      <input type="password" id="password" placeholder="請輸入密碼" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="btn btn-full" id="loginBtn" onclick="doLogin()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 點數總覽 -->
  <div class="section" id="dataSection">
    <div class="user-bar">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div class="user-bar-name" id="userBarName" style="font-size:16px;"></div>
        <div class="user-bar-name" id="userBarSub"  style="font-size:16px;color:#1e40af;font-weight:600;"></div>
      </div>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>

    <div class="section-header">
      <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;">
        <div class="section-title">點數總覽</div>
        <div class="section-sub" id="lastUpdateSub"></div>
      </div>
    </div>

    <div class="stat-row" id="statRow"></div>

    <div style="margin-top:4px; text-align:right;">
      <button class="btn-outline" id="usingBtn" onclick="loadUsing()">📋 點數使用查詢</button>
    </div>
  </div>

  <!-- 點數使用紀錄 -->
  <div class="section" id="usingSection">
    <div class="section-header">
      <div>
        <div class="section-title">點數使用紀錄</div>
        <div class="section-sub" id="usingSubtitle"></div>
      </div>
      <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#6b7280;cursor:pointer;user-select:none;display:none;">
        <input type="checkbox" id="showZero" onchange="renderUsing()" style="width:14px;height:14px;cursor:pointer;">
        顯示 0 點紀錄
      </label>
    </div>
    <table id="usingTable">
      <thead>
        <tr>
          <th>交易時間</th>
          <th>公設名稱</th>
          <th>交易類型</th>
          <th style="text-align:right;">交易點數</th>
        </tr>
      </thead>
      <tbody id="usingBody"></tbody>
    </table>
    <div class="empty-tip" id="usingEmpty" style="display:none;">無使用紀錄</div>
  </div>

</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxl72JqnTQczbO9hYw2LoR2i1GymTLmoolZdS3QhAGyqkB9xeviv7ricTZqwBKmzfX9mg/exec';

let currentUser = null;

// 日期格式化（前端處理，確保正確顯示）
function fmtDate(val) {
  if (!val) return '';
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function fmtDateTime(val) {
  if (!val) return '';
  // 已經是格式化字串（來自 Apps Script toDateTimeString）
  if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}/)) return val;
  const d = new Date(val);
  if (isNaN(d.getTime())) return val;
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return `${y}-${m}-${day} ${h}:${mi}`;
}

// 交易類型對應 badge
function txBadge(type) {
  if (!type) return '';
  if (type.includes('扣點') || type.includes('使用')) return `<span class="badge badge-red">${type}</span>`;
  if (type.includes('回補'))  return `<span class="badge badge-green">${type}</span>`;
  return `<span class="badge badge-gray">${type}</span>`;
}

async function doLogin() {
  const account  = document.getElementById('account').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!account || !password) { showError('請填寫帳號與密碼'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>驗證中...';
  hideError();

  try {
    const res = await fetch(`${SCRIPT_URL}?action=login&account=${encodeURIComponent(account)}&password=${encodeURIComponent(password)}`);
    const json = await res.json();
    if (!json.success) { showError('帳號密碼請洽詢大樓櫃檯祕書'); return; }
    // 儲存帳號密碼到 localStorage
    try {
      localStorage.setItem('lsy_account', account);
      localStorage.setItem('lsy_password', password);
    } catch(e) {}
    currentUser = { account, accountNo: json.accountNo };
    document.getElementById('loginCard').style.cssText = 'display:none;margin:0;padding:0;';
    // 先讓輸入框失焦（收起手機鍵盤），再延遲捲回頂部
    document.getElementById('account').blur();
    document.getElementById('password').blur();
    showDataSection(json.data);
    setTimeout(() => window.scrollTo(0, 0), 300);
  } catch(e) {
    showError('連線失敗，請稍後再試');
  } finally {
    btn.disabled = false;
    btn.textContent = '登入';
  }
}

function showDataSection(data) {
  document.getElementById('dataSection').style.display = 'block';
  document.getElementById('usingSection').style.display = 'none';
  window.scrollTo(0, 0);

  document.getElementById('userBarName').textContent = '帳號：' + currentUser.account;
  document.getElementById('userBarSub').textContent  = '戶號：' + currentUser.accountNo;

  const totalPts    = Number(data.totalPoints)    || 0;
  const expiringPts = Number(data.expiringPoints) || 0;
  const expireDate  = fmtDate(data.expiringDate).replace(/-/g, '/');
  const safePts     = Number(data.safePoints)     || (totalPts - expiringPts);

  const lastUpdate = data.lastUpdate || '';

  const lastUpdateSub = document.getElementById('lastUpdateSub');
  if (lastUpdateSub) lastUpdateSub.textContent = lastUpdate ? '最後更新日：' + lastUpdate : '';

  document.getElementById('statRow').innerHTML = `
    <div style="width:100%;background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:20px 20px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.05);">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:14px;color:#1a56db;font-weight:600;">目前剩餘點數</div>
        <div style="font-size:36px;font-weight:800;color:#1a56db;line-height:1;">${totalPts.toLocaleString()}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="flex:1;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:10px;padding:12px 14px;">
          <div style="font-size:12px;color:#c2410c;font-weight:600;margin-bottom:6px;">⚠ ${expireDate} 到期</div>
          <div style="font-size:24px;font-weight:800;color:#c2410c;line-height:1;">${expiringPts.toLocaleString()}</div>
        </div>
        <div style="font-size:20px;font-weight:700;color:#9ca3af;flex-shrink:0;">+</div>
        <div style="flex:1;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:12px 14px;">
          <div style="font-size:12px;color:#15803d;font-weight:600;margin-bottom:6px;">⚠ 2026/08/15 到期</div>
          <div style="font-size:24px;font-weight:800;color:#15803d;line-height:1;">${safePts.toLocaleString()}</div>
        </div>
      </div>
    </div>`;
}

let allUsingData = [];

async function loadUsing() {
  const btn = document.getElementById('usingBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner" style="border-top-color:#1a56db;border-color:#1a56db44"></span>載入中...';

  try {
    const res  = await fetch(`${SCRIPT_URL}?action=using&accountNo=${encodeURIComponent(currentUser.accountNo)}`);
    const json = await res.json();

    const sec = document.getElementById('usingSection');
    sec.style.display = 'block';
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });

    allUsingData = json.data || [];
    document.getElementById('showZero').checked = false;
    renderUsing();
  } catch(e) {
    alert('載入失敗，請稍後再試');
  } finally {
    btn.disabled = false;
    btn.textContent = '📋 點數使用查詢';
  }
}

function renderUsing() {
  const showZero = document.getElementById('showZero').checked;
  const rows = showZero ? allUsingData : allUsingData.filter(r => Number(r.txPoints) !== 0);

  const showCount = rows.length;
  document.getElementById('usingSubtitle').textContent = '共 ' + showCount + ' 筆（依時間遞減）';

  const tbody = document.getElementById('usingBody');
  const empty = document.getElementById('usingEmpty');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    document.getElementById('usingTable').style.display = 'none';
    empty.style.display = 'block';
  } else {
    document.getElementById('usingTable').style.display = 'table';
    empty.style.display = 'none';
    rows.forEach(r => {
      const pts = Number(r.txPoints);
      const ptsHtml = pts < 0
        ? `<span class="tx-minus">${pts.toLocaleString()}</span>`
        : pts > 0
          ? `<span class="tx-plus">+${pts.toLocaleString()}</span>`
          : `<span style="color:#9ca3af;">0</span>`;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${fmtDateTime(r.txTime)}</td>
        <td>${r.facility || '-'}</td>
        <td>${txBadge(r.txType)}</td>
        <td style="text-align:right;">${ptsHtml}</td>`;
      tbody.appendChild(tr);
    });
  }
}

function doLogout() {
  currentUser = null;
  document.getElementById('loginCard').style.display = 'block';
  // 保留帳號密碼，方便重新登入
  document.getElementById('dataSection').style.display = 'none';
  document.getElementById('usingSection').style.display = 'none';
  hideError();
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// 頁面載入時自動帶入上次的帳號密碼
window.addEventListener('DOMContentLoaded', () => {
  try {
    const savedAccount  = localStorage.getItem('lsy_account');
    const savedPassword = localStorage.getItem('lsy_password');
    if (savedAccount)  document.getElementById('account').value  = savedAccount;
    if (savedPassword) document.getElementById('password').value = savedPassword;
  } catch(e) {}
});


</script>
</body>
</html>
