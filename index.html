<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>林森苑公設預約查詢</title>
<!-- 載入現代字型 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-app: #090d16;
  --bg-card: rgba(17, 24, 39, 0.7);
  --bg-card-hover: rgba(17, 24, 39, 0.85);
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.35);
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --border: rgba(255, 255, 255, 0.08);
  --slot-on-bg: rgba(16, 185, 129, 0.15);
  --slot-on-border: rgba(16, 185, 129, 0.4);
  --slot-on-text: #34d399;
  --slot-off-bg: rgba(255, 255, 255, 0.03);
  --slot-off-border: rgba(255, 255, 255, 0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: var(--bg-app);
  color: var(--text-main);
  min-height: 100vh;
  padding: 24px 16px 80px;
  overflow-x: hidden;
  background-image: 
    radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%);
}

.container { max-width: 480px; margin: 0 auto; }

/* 玻璃擬態卡片 */
.card {
  background: var(--bg-card);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  padding: 40px 32px 36px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.banner-img {
  margin: -40px -32px 28px -32px;
  border-radius: 24px 24px 0 0;
  overflow: hidden;
  height: 160px;
  position: relative;
}
.banner-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 75%;
}
.banner-img::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(transparent, var(--bg-app));
}

h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }

label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #cbd5e1;
  margin-bottom: 6px;
  text-align: left;
}
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 16px;
  color: #fff;
  outline: none;
  transition: all 0.2s ease;
}
input:focus {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.field { margin-bottom: 20px; }

.btn {
  padding: 12px 24px;
  background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
  transition: all 0.2s ease;
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(37, 99, 235, 0.45);
}
.btn:active { transform: translateY(1px); }
.btn:disabled {
  background: #4b5563;
  color: #9ca3af;
  box-shadow: none;
  cursor: not-allowed;
}
.btn-full { width: 100%; margin-top: 10px; }

.error-msg {
  margin-top: 18px;
  padding: 12px 16px;
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  display: none;
  animation: fadeIn 0.3s ease;
}

.spinner {
  display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* 主控面板 */
.panel {
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  display: none;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.navbtn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  color: #fff;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
}
.navbtn:hover { background: rgba(255,255,255,0.1); border-color: var(--text-muted); }
#datePick {
  border: none;
  background: transparent;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  outline: none;
  cursor: pointer;
}
#datePick::-webkit-calendar-picker-indicator {
  filter: invert(1);
}

.filters { padding: 14px 20px; border-bottom: 1px solid var(--border); }
.tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.tabs::-webkit-scrollbar { height: 0px; }
.tab {
  font-size: 13px;
  font-weight: 600;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  white-space: nowrap;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.tab:hover { background: rgba(255,255,255,0.06); color: #fff; }
.tab.on {
  border-color: transparent;
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 12px var(--accent-glow);
}
.legend { display: flex; align-items: center; gap: 14px; margin-top: 14px; font-size: 12px; color: var(--text-muted); }
.sw { width: 16px; height: 12px; border-radius: 4px; display: inline-block; }
.sw-on { background: var(--slot-on-bg); border: 1px solid var(--slot-on-border); }
.sw-off { background: var(--slot-off-bg); border: 1px solid var(--slot-off-border); }

/* 表格樣式 */
.gridbody { display: flex; max-height: 480px; position: relative; }
.namecol {
  flex-shrink: 0;
  width: 96px;
  border-right: 1px solid var(--border);
  overflow: hidden;
  background: rgba(17, 24, 39, 0.9);
  z-index: 3;
}
.namehead { height: 35px; border-bottom: 1px solid var(--border); }
.nameview { overflow: hidden; }
.scroller { flex: 1; overflow: auto; }
.scroller::-webkit-scrollbar { width: 6px; height: 6px; }
.scroller::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

.axis {
  display: flex;
  height: 34px;
  position: sticky;
  top: 0;
  z-index: 2;
  background: #111827;
  border-bottom: 1px solid var(--border);
  width: max-content;
}
.axis .h {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  border-left: 1px solid var(--border);
}

.rows { width: max-content; }
.grp {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: flex-end;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border);
}
.nm {
  display: flex;
  align-items: center;
  padding-left: 14px;
  font-size: 13px;
  font-weight: 500;
  color: #e2e8f0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-bottom: 1px solid var(--border);
}
.row { display: flex; border-bottom: 1px solid var(--border); }
.seg { padding: 4px 2px; }
.seg .box {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  transition: transform 0.15s ease;
}
.seg .box:hover { transform: scale(1.08); }
.seg .on {
  background: var(--slot-on-bg);
  border: 1px solid var(--slot-on-border);
  color: var(--slot-on-text);
}
.seg .off {
  background: var(--slot-off-bg);
  border: 1px solid var(--slot-off-border);
}
.hint { margin-left: auto; color: var(--text-muted); font-style: italic; }
.status {
  padding: 40px 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.status-spinner {
  width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
}

.logout-row { padding: 12px 14px; border-top: 1px solid var(--border); text-align: right; }
.logout-btn {
  font-size: 12px;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.logout-btn:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.4); color: #fca5a5; }

/* 背景局部載入進度條 */
.bg-progress-bar {
  height: 2px;
  background: var(--accent);
  position: absolute;
  top: 0; left: 0; width: 0%;
  z-index: 10;
  transition: width 0.3s ease, opacity 0.3s ease;
  box-shadow: 0 0 8px var(--accent);
  opacity: 0;
}
</style>
</head>
<body>
<div class="container">

  <!-- 登入卡片 -->
  <div class="card" id="loginCard">
    <div class="banner-img">
      <img src="https://lh3.googleusercontent.com/gps-cs-s/APNQkAG0rlmSYs04bzg_pdUjwIFbzGD53FRsJ1NFVXGjsZFjI_TF0HNSiWyF3IZtEa6kMXWkjqgmRO1dZyQdxa64rPAQUzQsG7dlrF-wCU1nXdFluek3Bjl02XrHK8HhUCenOy07z4gy=s1360-w1360-h1020-rw" alt="林森苑">
    </div>
    <h1>林森苑公設預約查詢</h1>
    <div class="subtitle">請登入後查看公設可預約狀態</div>
    <div class="field">
      <label for="account">帳號</label>
      <input type="text" id="account" placeholder="請輸入帳號" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="field">
      <label for="password">密碼</label>
      <input type="password" id="password" placeholder="請輸入密碼" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="btn btn-full" id="loginBtn" onclick="doLogin()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 主控制面板 -->
  <div class="panel" id="panel">
    <div class="bg-progress-bar" id="bgProgress"></div>
    <div class="topbar">
      <button class="navbtn" id="prevDay">‹</button>
      <input type="date" id="datePick">
      <button class="navbtn" id="nextDay">›</button>
    </div>
    <div class="filters">
      <div class="tabs" id="tabs"></div>
      <div class="legend">
        <span><span class="sw sw-on"></span> 可預約</span>
        <span><span class="sw sw-off"></span> 不可預約</span>
        <span class="hint">↔ 左右滑</span>
      </div>
    </div>
    <div id="status" class="status">
      <div class="status-spinner"></div>
      <span>載入中…</span>
    </div>
    <div class="gridbody" id="grid" style="display:none;">
      <div class="namecol">
        <div class="namehead"></div>
        <div class="nameview"><div id="nameCol"></div></div>
      </div>
      <div class="scroller" id="scroller">
        <div class="axis" id="axis"></div>
        <div class="rows" id="rows"></div>
      </div>
    </div>
    <div class="logout-row"><button class="logout-btn" onclick="doLogout()">登出</button></div>
  </div>

</div>

<script>
// ====== 換成你的 Apps Script 部署網址 ======
const EXEC = 'https://script.google.com/macros/s/AKfycbxl72JqnTQczbO9hYw2LoR2i1GymTLmoolZdS3QhAGyqkB9xeviv7ricTZqwBKmzfX9mg/exec';

const START = 6, END = 24;
const HOURS = [];
for (let h = START; h < END; h++) HOURS.push(h);
const SEG_W = 22, ROW_H = 40, GRP_H = 26;
const CATS = ['車位', '運動', '休閒', '全部']; // 將車位調整為第一個 (預設選中)

let active = '車位'; // 預設改成車位
let dataset = [];
let bgLoading = false; // 是否在背景載入剩餘數據中

async function doLogin() {
  const account  = document.getElementById('account').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!account || !password) { showError('請填寫帳號與密碼'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>驗證中...';
  hideError();
  
  try {
    // 💡 優化：直接請求預設的「車位」公設狀態！這樣成功時直接拿到車位資料，失敗時代表帳密錯誤
    const res = await fetch(EXEC + '?action=facilities&cat=' + encodeURIComponent(active) + '&account=' + encodeURIComponent(account) + '&password=' + encodeURIComponent(password));
    const json = await res.json();
    
    if (!json.ok) { 
      showError(json.error || '帳號或密碼錯誤'); 
      return; 
    }
    
    // 登入成功，儲存帳密
    try { 
      localStorage.setItem('lsy_account', account); 
      localStorage.setItem('lsy_password', password); 
    } catch(e) {}
    
    // 初始化資料集並將首批車位資料寫入
    dataset = json.data || [];
    
    // 切換介面
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    setTimeout(() => window.scrollTo(0, 0), 200);
    
    // 直接渲染已取得的車位資料
    const status = document.getElementById('status');
    const grid = document.getElementById('grid');
    status.style.display = 'none';
    grid.style.display = 'flex';
    
    buildAxis();
    render();
    
    // 在背景靜默載入剩餘的「全部」資料，讓後續切換 Tab 不需等待
    fetchRemainingData(account, password);
    
  } catch(e) {
    showError('連線失敗，請稍後再試');
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}

function doLogout() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';
  hideError();
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginCard').style.display !== 'none') doLogin();
});

const dp = document.getElementById('datePick');
function pad(n){ return String(n).padStart(2,'0'); }
function toVal(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
let cur = new Date();
dp.value = toVal(cur);
dp.min = toVal(new Date());
document.getElementById('prevDay').onclick = () => { cur.setDate(cur.getDate()-1); dp.value = toVal(cur); load(); };
document.getElementById('nextDay').onclick = () => { cur.setDate(cur.getDate()+1); dp.value = toVal(cur); load(); };
dp.onchange = () => { const v = dp.value.split('-'); cur = new Date(+v[0], +v[1]-1, +v[2]); load(); };

// 當切換日期或強制重載時呼叫
async function load(){
  const status = document.getElementById('status');
  const grid = document.getElementById('grid');
  status.style.display = 'block'; 
  status.innerHTML = '<div class="status-spinner"></div><span>載入中…</span>';
  grid.style.display = 'none';
  
  const account  = localStorage.getItem('lsy_account') || '';
  const password = localStorage.getItem('lsy_password') || '';
  
  try {
    // 1. 先快速載入「當前選中分類」
    const res = await fetch(EXEC + '?action=facilities&date=' + dp.value + '&account=' + encodeURIComponent(account) + '&password=' + encodeURIComponent(password) + '&cat=' + encodeURIComponent(active));
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || '讀取失敗');
    
    dataset = json.data || [];
    status.style.display = 'none';
    grid.style.display = 'flex';
    buildAxis();
    render();
    
    // 2. 背景載入剩餘完整資料
    fetchRemainingData(account, password);
  } catch (err) {
    status.style.display = 'block';
    status.innerHTML = '載入失敗：' + err.message;
  }
}

// 背景載入剩餘完整資料的異步函數
async function fetchRemainingData(account, password) {
  if (bgLoading) return;
  bgLoading = true;
  
  const prog = document.getElementById('bgProgress');
  prog.style.width = '30%';
  prog.style.opacity = '1';
  
  try {
    // 請求沒有限制分類的全部資料
    const res = await fetch(EXEC + '?action=facilities&date=' + dp.value + '&account=' + encodeURIComponent(account) + '&password=' + encodeURIComponent(password));
    prog.style.width = '70%';
    const json = await res.json();
    
    if (json.ok && json.data) {
      // 後端回傳了完整資料，直接覆蓋資料集
      dataset = json.data;
      
      // 更新畫面 (如果當前選中的是全部、或是切換後的分類，畫面上就會顯示最新完整資料)
      render();
    }
  } catch (e) {
    console.error("背景載入剩餘資料失敗:", e);
  } finally {
    prog.style.width = '100%';
    setTimeout(() => {
      prog.style.opacity = '0';
      setTimeout(() => { prog.style.width = '0%'; }, 300);
    }, 500);
    bgLoading = false;
  }
}

function buildAxis(){
  const axis = document.getElementById('axis');
  axis.innerHTML = '';
  HOURS.forEach(h => {
    const c = document.createElement('div');
    c.className = 'h';
    c.style.width = (SEG_W*2)+'px'; c.style.minWidth = (SEG_W*2)+'px';
    c.textContent = h;
    axis.appendChild(c);
  });
}

function capAt(f, h, m){
  const key = pad(h) + ':' + pad(m);
  return (key in f.slots) ? f.slots[key] : null;
}

function segEl(f, h, m){
  const c = capAt(f, h, m);
  const ok = c != null;
  const wrap = document.createElement('div');
  wrap.className = 'seg';
  wrap.style.width = SEG_W+'px'; wrap.style.minWidth = SEG_W+'px';
  if (m === 0) wrap.style.borderLeft = '1px solid var(--border)';
  wrap.title = pad(h)+':'+pad(m)+'　'+(ok ? '剩 '+c : '不可預約');
  const box = document.createElement('div');
  box.className = 'box ' + (ok ? 'on' : 'off');
  if (ok && f.cap > 1) box.textContent = c;
  wrap.appendChild(box);
  return wrap;
}

function render(){
  const nameCol = document.getElementById('nameCol');
  const rows = document.getElementById('rows');
  nameCol.innerHTML = ''; rows.innerHTML = '';
  
  // 過濾當前要顯示的項目
  const list = active === '全部' ? dataset : dataset.filter(f => f.cat === active);
  
  if (list.length === 0) {
    // 若目前資料集中無資料且正在背景載入中，提示載入中
    const placeholder = document.createElement('div');
    placeholder.style.padding = '20px';
    placeholder.style.color = 'var(--text-muted)';
    placeholder.style.fontSize = '13px';
    placeholder.textContent = bgLoading ? '正在背景載入資料中...' : '無此分類之公設資料';
    nameCol.appendChild(placeholder);
    return;
  }
  
  let curCat = null;
  list.forEach(f => {
    if (active === '全部' && f.cat !== curCat){
      curCat = f.cat;
      const gn = document.createElement('div');
      gn.className = 'grp';
      gn.style.height = GRP_H+'px'; gn.style.paddingLeft = '12px'; gn.style.paddingBottom = '4px';
      gn.textContent = f.cat + '設施';
      nameCol.appendChild(gn);
      const gr = document.createElement('div'); gr.style.height = GRP_H+'px'; rows.appendChild(gr);
    }
    const nm = document.createElement('div');
    nm.className = 'nm'; nm.style.height = ROW_H+'px';
    nm.textContent = f.name;
    nameCol.appendChild(nm);
    
    const row = document.createElement('div');
    row.className = 'row'; row.style.height = ROW_H+'px';
    HOURS.forEach(h => {
      row.appendChild(segEl(f, h, 0));
      if (f.half) {
        row.appendChild(segEl(f, h, 30));
      } else {
        const c = capAt(f, h, 0); const ok = c != null;
        const wrap = document.createElement('div');
        wrap.className = 'seg'; wrap.style.width = SEG_W+'px'; wrap.style.minWidth = SEG_W+'px';
        const box = document.createElement('div');
        box.className = 'box ' + (ok ? 'on' : 'off');
        wrap.appendChild(box);
        row.appendChild(wrap);
      }
    });
    rows.appendChild(row);
  });
}

const scroller = document.getElementById('scroller');
scroller.addEventListener('scroll', () => {
  document.getElementById('nameCol').style.transform = 'translateY(' + (-scroller.scrollTop) + 'px)';
});

const tabsEl = document.getElementById('tabs');
function renderTabs(){
  tabsEl.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab' + (c === active ? ' on' : '');
    b.textContent = c;
    b.onclick = () => { active = c; renderTabs(); render(); };
    tabsEl.appendChild(b);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    const a = localStorage.getItem('lsy_account');
    const p = localStorage.getItem('lsy_password');
    if (a) document.getElementById('account').value = a;
    if (p) document.getElementById('password').value = p;
  } catch(e) {}
  renderTabs();
});
</script>
</body>
</html>
