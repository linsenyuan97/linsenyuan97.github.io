<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>林森苑公設預約查詢</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
  background: #f0f2f5; color: #111827;
  min-height: 100vh; padding: 20px 16px 60px;
}
.container { max-width: 460px; margin: 0 auto; }

.card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 24 rgba(0,0,0,0.09);
  padding: 40px 36px 36px;
}
.banner-img { margin: -40px -36px 24px -36px; border-radius: 16px 16px 0 0; overflow: hidden; height: 140px; }
.banner-img img { width: 100%; height: 100%; object-fit: cover; object-position: 0 80%; }
h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #6b7280; margin: 4px 0 24px; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
input[type="text"], input[type="password"] {
  width: 100%; padding: 9px 13px; border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: 16px; color: #111827; outline: none; transition: border-color 0.15s;
}
input:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.10); }
.field { margin-bottom: 16px; }
.btn {
  padding: 10px 20px; background: #1a56db; color: #fff; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
}
.btn:hover { background: #1444b8; }
.btn:disabled { background: #93a8e8; cursor: not-allowed; }
.btn-full { width: 100%; margin-top: 6px; }
.error-msg {
  margin-top: 14px; padding: 10px 14px; background: #fef2f2; border: 1.5px solid #fca5a5;
  color: #991b1b; border-radius: 8px; font-size: 13px; font-weight: 600; display: none;
}
.spinner {
  display: inline-block; width: 14px; height: 14px; border: 2px solid #ffffff55;
  border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.panel {
  background: #fff; border: 0.5px solid #e5e7eb; border-radius: 16px;
  overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.09); display: none;
}
.topbar { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid #e5e7eb; }
.navbtn { width: 32px; height: 32px; border: 0.5px solid #d1d5db; border-radius: 999px; background: #fff; cursor: pointer; font-size: 16px; line-height: 1; }
#datePick { border: none; background: transparent; font-size: 15px; font-weight: 600; text-align: center; }
.filters { padding: 10px 14px; border-bottom: 0.5px solid #e5e7eb; }
.tabs { display: flex; gap: 6px; overflow-x: auto; }
.tab { font-size: 13px; padding: 6px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap; border: 0.5px solid #d1d5db; background: #fff; color: #6b7280; }
.tab.on { border-color: transparent; background: #e6f0ff; color: #1a56db; }
.legend { display: flex; align-items: center; gap: 14px; margin-top: 10px; font-size: 12px; color: #6b7280; }
.sw { width: 18px; height: 14px; border-radius: 7px; display: inline-block; }
.sw-on { background: #eaf6f0; border: 0.5px solid #cfe9dd; }
.sw-off { background: #f0f2f5; }
.gridbody { display: flex; max-height: 420px; }
.namecol { flex-shrink: 0; width: 84px; border-right: 0.5px solid #e5e7eb; overflow: hidden; background: #fff; }
.namehead { height: 31px; border-bottom: 0.5px solid #e5e7eb; }
.nameview { overflow: hidden; }
.scroller { flex: 1; overflow: auto; }
.axis { display: flex; height: 30px; position: sticky; top: 0; z-index: 2; background: #fff; border-bottom: 0.5px solid #e5e7eb; width: max-content; }
.axis .h { display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #6b7280; border-left: 0.5px solid #e5e7eb; }
.rows { width: max-content; }
.grp { font-size: 12px; color: #9ca3af; display: flex; align-items: flex-end; }
.nm { display: flex; align-items: center; padding-left: 12px; font-size: 14px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row { display: flex; }
.seg { padding: 3px 1px; }
.seg .box { height: 100%; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #2e8b6e; }
.seg .on { background: #eaf6f0; border: 0.5px solid #cfe9dd; }
.seg .off { background: #f0f2f5; border: 0.5px solid transparent; }
.hint { margin-left: auto; color: #9ca3af; }
.status { padding: 24px; text-align: center; color: #9ca3af; font-size: 14px; }
.logout-row { padding: 10px 14px; border-top: 0.5px solid #e5e7eb; text-align: right; }
.logout-btn { font-size: 12px; color: #6b7280; background: none; border: 1px solid #d1d5db; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
</style>
</head>
<body>
<div class="container">

  <div class="card" id="loginCard">
    <div class="banner-img">
      <img src="https://lh3.googleusercontent.com/gps-cs-s/APNQkAG0rlmSYs04bzg_pdUjwIFbzGD53FRsJ1NFVXGjsZFjI_TF0HNSiWyF3IZtEa6kMXWkjqgmRO1dZyQdxa64rPAQUzQsG7dlrF-wCU1nXdFluek3Bjl02XrHK8HhUCenOy07z4gy=s1360-w1360-h1020-rw" alt="林森苑">
    </div>
    <h1>林森苑公設預約查詢</h1>
    <div class="subtitle">請登入後查看公設可預約狀態</div>
    <div class="field">
      <label for="account">帳號</label>
      <input type="text" id="account" placeholder="請輸入帳號" inputmode="numeric" pattern="[0-9]*">
    </div>
    <div class="field">
      <label for="password">密碼</label>
      <input type="password" id="password" placeholder="請輸入密碼" inputmode="numeric" pattern="[0-9]*">
    </div>
    <button class="btn btn-full" id="loginBtn" onclick="doLogin()">登入</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="panel" id="panel">
    <div class="topbar">
      <button class="navbtn" id="prevDay">‹</button>
      <input type="date" id="datePick">
      <button class="navbtn" id="nextDay">›</button>
    </div>
    <div class="filters">
      <div class="tabs" id="tabs"></div>
      <div class="legend">
        <span><span class="sw sw-on"></span> 可預約</span>
        <span><span class="sw sw-off"></span> 不可預約</span>
        <span class="hint">↔ 左右滑</span>
      </div>
    </div>
    <div id="status" class="status">載入中…</div>
    <div class="gridbody" id="grid" style="display:none;">
      <div class="namecol">
        <div class="namehead"></div>
        <div class="nameview"><div id="nameCol"></div></div>
      </div>
      <div class="scroller" id="scroller">
        <div class="axis" id="axis"></div>
        <div class="rows" id="rows"></div>
      </div>
    </div>
    <div class="logout-row"><button class="logout-btn" onclick="doLogout()">登出</button></div>
  </div>

</div>

<script>
// ====== 換成你的 Apps Script 部署網址 ======
const EXEC = 'https://script.google.com/macros/s/AKfycbxl72JqnTQczbO9hYw2LoR2i1GymTLmoolZdS3QhAGyqkB9xeviv7ricTZqwBKmzfX9mg/exec';

const START = 6, END = 24;
const HOURS = [];
for (let h = START; h < END; h++) HOURS.push(h);
const SEG_W = 22, ROW_H = 40, GRP_H = 26;
const CATS = ['全部', '車位', '運動', '休閒'];

let active = '全部'; // 預設顯示全部
let dataset = [];
let bgLoading = false; // 是否正在載入中

async function doLogin() {
  const account  = document.getElementById('account').value.trim();
  const password = document.getElementById('password').value.trim();
  if (!account || !password) { showError('請填寫帳號與密碼'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>驗證中...';
  hideError();
  
  try {
    // 暫存帳密至 localStorage，供後續 load() 使用
    localStorage.setItem('lsy_account', account);
    localStorage.setItem('lsy_password', password);
    
    // 直接調用 load() 載入全部資料與驗證
    await load();
    
    // 載入成功，切換介面
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    setTimeout(() => window.scrollTo(0, 0), 200);
  } catch(e) {
    // 驗證失敗，清除暫存並顯示錯誤
    localStorage.removeItem('lsy_account');
    localStorage.removeItem('lsy_password');
    showError(e.message || '帳號或密碼錯誤');
  } finally {
    btn.disabled = false; btn.textContent = '登入';
  }
}

function doLogout() {
  document.getElementById('panel').style.display = 'none';
  document.getElementById('loginCard').style.display = 'block';
  hideError();
}
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginCard').style.display !== 'none') doLogin();
});

const dp = document.getElementById('datePick');
function pad(n){ return String(n).padStart(2,'0'); }
function toVal(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
let cur = new Date();
dp.value = toVal(cur);
dp.min = toVal(new Date());
document.getElementById('prevDay').onclick = () => { cur.setDate(cur.getDate()-1); dp.value = toVal(cur); load(); };
document.getElementById('nextDay').onclick = () => { cur.setDate(cur.getDate()+1); dp.value = toVal(cur); load(); };
dp.onchange = () => { const v = dp.value.split('-'); cur = new Date(+v[0], +v[1]-1, +v[2]); load(); };

// ── 核心載入函數：並行載入所有分類，並實現漸進式渲染 ────────────────
async function load() {
  if (bgLoading) return;
  bgLoading = true;

  const status = document.getElementById('status');
  const grid = document.getElementById('grid');
  
  status.style.display = 'block'; status.textContent = '載入中…';
  grid.style.display = 'none';
  
  const account  = localStorage.getItem('lsy_account') || '';
  const password = localStorage.getItem('lsy_password') || '';
  
  dataset = []; // 重置資料集
  
  // 並行載入車位、運動、休閒三個分類
  const categories = ['車位', '運動', '休閒'];
  let completedCount = 0;
  let successCount = 0;
  let authError = null;
  
  const promises = categories.map(async (cat) => {
    try {
      const res = await fetch(EXEC + '?action=facilities&date=' + dp.value + '&account=' + encodeURIComponent(account) + '&password=' + encodeURIComponent(password) + '&cat=' + encodeURIComponent(cat));
      const json = await res.json();
      
      if (!json.ok) {
        authError = json.error || '帳號或密碼錯誤';
        return;
      }
      
      // 合併新資料並過濾重複的 pf_id / pfId
      const existingIds = dataset.map(f => String(f.pf_id || f.pfId));
      const newData = json.data.filter(f => !existingIds.includes(String(f.pf_id || f.pfId)));
      dataset = dataset.concat(newData);
      successCount++;
      
      // 💡 漸進式渲染：只要第一個請求完成，立刻關閉 Loading 並渲染畫面，讓使用者先看到局部資料！
      status.style.display = 'none';
      grid.style.display = 'flex';
      buildAxis();
      render();
      
    } catch (e) {
      console.error("載入分類 " + cat + " 失敗:", e);
    } finally {
      completedCount++;
    }
  });
  
  // 等待三項並行請求全部完成
  await Promise.all(promises);
  bgLoading = false;
  
  // 如果完全沒有成功回傳，且有回傳認證錯誤，則代表帳密錯誤，拋出異常供登入介面補捉
  if (successCount === 0) {
    throw new Error(authError || '讀取資料失敗，請檢查網路連線');
  }
}

function buildAxis(){
  const axis = document.getElementById('axis');
  axis.innerHTML = '';
  HOURS.forEach(h => {
    const c = document.createElement('div');
    c.className = 'h';
    c.style.width = (SEG_W*2)+'px'; c.style.minWidth = (SEG_W*2)+'px';
    c.textContent = h;
    axis.appendChild(c);
  });
}

function capAt(f, h, m){
  const key = pad(h) + ':' + pad(m);
  return (key in f.slots) ? f.slots[key] : null;
}

function segEl(f, h, m){
  const c = capAt(f, h, m);
  const ok = c != null;
  const wrap = document.createElement('div');
  wrap.className = 'seg';
  wrap.style.width = SEG_W+'px'; wrap.style.minWidth = SEG_W+'px';
  if (m === 0) wrap.style.borderLeft = '0.5px solid #e5e7eb';
  wrap.title = pad(h)+':'+pad(m)+'　'+(ok ? '剩 '+c : '不可預約');
  const box = document.createElement('div');
  box.className = 'box ' + (ok ? 'on' : 'off');
  if (ok && f.cap >= 1) box.textContent = c;
  wrap.appendChild(box);
  return wrap;
}

function render(){
  const nameCol = document.getElementById('nameCol');
  const rows = document.getElementById('rows');
  nameCol.innerHTML = ''; rows.innerHTML = '';
  
  // 過濾當前選定標籤的資料項目
  const list = active === '全部' ? dataset : dataset.filter(f => f.cat === active);
  
  if (list.length === 0) {
    const placeholder = document.createElement('div');
    placeholder.style.padding = '20px';
    placeholder.style.color = '#9ca3af';
    placeholder.style.fontSize = '13px';
    placeholder.textContent = bgLoading ? '正在載入資料中...' : '無此分類之公設資料';
    nameCol.appendChild(placeholder);
    return;
  }
  
  let curCat = null;
  list.forEach(f => {
    if (active === '全部' && f.cat !== curCat){
      curCat = f.cat;
      const gn = document.createElement('div');
      gn.className = 'grp';
      gn.style.height = GRP_H+'px'; gn.style.paddingLeft = '12px'; gn.style.paddingBottom = '4px';
      gn.textContent = f.cat + '設施';
      nameCol.appendChild(gn);
      const gr = document.createElement('div'); gr.style.height = GRP_H+'px'; rows.appendChild(gr);
    }
    const nm = document.createElement('div');
    nm.className = 'nm'; nm.style.height = ROW_H+'px';
    nm.textContent = f.name;
    nameCol.appendChild(nm);
    
    const row = document.createElement('div');
    row.className = 'row'; row.style.height = ROW_H+'px';
    HOURS.forEach(h => {
      row.appendChild(segEl(f, h, 0));
      if (f.half) {
        row.appendChild(segEl(f, h, 30));
      } else {
        const c = capAt(f, h, 0); const ok = c != null;
        const wrap = document.createElement('div');
        wrap.className = 'seg'; wrap.style.width = SEG_W+'px'; wrap.style.minWidth = SEG_W+'px';
        const box = document.createElement('div');
        box.className = 'box ' + (ok ? 'on' : 'off');
        wrap.appendChild(box);
        row.appendChild(wrap);
      }
    });
    rows.appendChild(row);
  });
}

const scroller = document.getElementById('scroller');
scroller.addEventListener('scroll', () => {
  document.getElementById('nameCol').style.transform = 'translateY(' + (-scroller.scrollTop) + 'px)';
});

const tabsEl = document.getElementById('tabs');
function renderTabs(){
  tabsEl.innerHTML = '';
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'tab' + (c === active ? ' on' : '');
    b.textContent = c;
    b.onclick = () => { active = c; renderTabs(); render(); };
    tabsEl.appendChild(b);
  });
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    const a = localStorage.getItem('lsy_account');
    const p = localStorage.getItem('lsy_password');
    if (a) document.getElementById('account').value = a;
    if (p) document.getElementById('password').value = p;
  } catch(e) {}
  renderTabs();
});
</script>
</body>
</html>
